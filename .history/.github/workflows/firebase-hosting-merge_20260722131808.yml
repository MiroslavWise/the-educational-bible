name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.22.2"
          cache: npm
      - run: npm ci && npm run build
        env:
          VITE_ADMIN: ${{ vars.VITE_ADMIN }}
          VITE_API_BOT_NAME: ${{ vars.VITE_API_BOT_NAME }}
          VITE_WINDOWS: ${{ vars.VITE_WINDOWS }}
          VITE_ANIME: ${{ vars.VITE_ANIME }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_A_QUIZ_FRONTEND }}
          channelId: live
          projectId: a-quiz-frontend

      - name: Get commit info
        run: |
          SUBJECT="$(git log -1 --pretty=%s ${{ github.sha }})"
          SUBJECT_ESCAPED="$(printf '%s' "$SUBJECT" | sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g')"
          echo "COMMIT_SUBJECT=$SUBJECT_ESCAPED" >> "$GITHUB_ENV"

          # Пункты «Изменения» из .git-next.md переносятся в тело коммита (npm run git),
          # сам файл при этом очищается — поэтому берём список изменений из тела коммита.
          BODY_ESCAPED="$(git log -1 --pretty=%b ${{ github.sha }} \
            | sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g')"
          CHANGES_ENCODED="$(printf '%s' "$BODY_ESCAPED" | awk 'NF' | sed ':a;N;$!ba;s/\n/%0A/g')"
          if [ -n "$CHANGES_ENCODED" ]; then
            echo "COMMIT_CHANGES=%0A<b>Изменения:</b>%0A${CHANGES_ENCODED}" >> "$GITHUB_ENV"
          else
            echo "COMMIT_CHANGES=" >> "$GITHUB_ENV"
          fi

      - name: Notify Telegram (success)
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            -d "text=✅ <b>Firebase Hosting</b> деплой успешен%0A<b>Repo:</b> ${GITHUB_REPOSITORY}%0A<b>Branch:</b> ${GITHUB_REF_NAME}%0A<b>Commit:</b> ${GITHUB_SHA}%0A<b>Title:</b> ${COMMIT_SUBJECT}%0A<b>Run:</b> https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}${COMMIT_CHANGES}"

      - name: Notify Telegram (failure)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            -d "text=❌ <b>Firebase Hosting</b> деплой упал%0A<b>Repo:</b> ${GITHUB_REPOSITORY}%0A<b>Branch:</b> ${GITHUB_REF_NAME}%0A<b>Commit:</b> ${GITHUB_SHA}%0A<b>Title:</b> ${COMMIT_SUBJECT}%0A<b>Run:</b> https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
